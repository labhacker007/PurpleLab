version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  PurpleLab — Production Docker Compose
#  Services: postgres, redis, backend, celery_worker, celery_beat, frontend
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: purplelab-db
    environment:
      POSTGRES_USER: purplelab
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-purplelab}
      POSTGRES_DB: purplelab
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U purplelab -d purplelab"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      purplelab:
        aliases:
          - purplelab-postgres

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: purplelab-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks:
      - purplelab

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: purplelab-backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 2
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://purplelab:${POSTGRES_PASSWORD:-purplelab}@purplelab-postgres:5432/purplelab
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CHROMA_PERSIST_DIR: /app/data/chroma
      PYTHONUNBUFFERED: "1"
      JOTI_BASE_URL: http://host.docker.internal:8000
    ports:
      - "${PURPLELAB_BACKEND_PORT:-8002}:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      start_period: 45s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 512M
    networks:
      - purplelab

  # ── Celery Worker ───────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: purplelab-worker
    command: celery -A backend.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://purplelab:${POSTGRES_PASSWORD:-purplelab}@purplelab-postgres:5432/purplelab
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CHROMA_PERSIST_DIR: /app/data/chroma
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 256M
    networks:
      - purplelab

  # ── Celery Beat (Scheduler) ─────────────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: purplelab-beat
    command: celery -A backend.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://purplelab:${POSTGRES_PASSWORD:-purplelab}@purplelab-postgres:5432/purplelab
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PYTHONUNBUFFERED: "1"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    networks:
      - purplelab

  # ── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
    container_name: purplelab-frontend
    environment:
      NODE_ENV: production
    ports:
      - "${PURPLELAB_FRONTEND_PORT:-3002}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - purplelab

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  chroma_data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  purplelab:
    driver: bridge
  joti_default:
    external: true
