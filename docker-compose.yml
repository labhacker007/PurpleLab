version: "3.9"

services:
  joti-sim:
    build: .
    ports:
      - "4000:4000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://jotisim:jotisim@postgres:5432/jotisim
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    command: python -m uvicorn backend.main:app --host 0.0.0.0 --port 4000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - joti_default

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: jotisim
      POSTGRES_PASSWORD: jotisim
      POSTGRES_DB: jotisim
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jotisim"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:

networks:
  joti_default:
    external: true
