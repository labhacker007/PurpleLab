version: "3.9"

services:
  purplelab:
    build: .
    container_name: purplelab-api
    ports:
      - "4000:4000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://purplelab:${POSTGRES_PASSWORD:-purplelab}@postgres:5432/purplelab
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-claude-sonnet-4-20250514}
      - DEBUG=${DEBUG:-true}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - CHROMA_PERSIST_DIR=/app/data/chroma
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./scripts:/app/scripts
      - ./tests:/app/tests
      - ./data:/app/data
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    command: python -m uvicorn backend.main:app --host 0.0.0.0 --port 4000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/api/catalog"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    networks:
      - default
      - joti_default

  postgres:
    image: postgres:17-alpine
    container_name: purplelab-db
    environment:
      POSTGRES_USER: purplelab
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-purplelab}
      POSTGRES_DB: purplelab
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U purplelab"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: purplelab-redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redisdata:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:

networks:
  joti_default:
    external: true
